<header class="app-header">
    <ng-container *ngIf="user.isLoggedIn$ | async; else loginLink">
        <button class="header-btn logout" (click)="onLogout()">ログアウト</button>
    </ng-container>
    <ng-template #loginLink>
        <a class="header-btn login" routerLink="/login">ログイン</a>
    </ng-template>
</header>
