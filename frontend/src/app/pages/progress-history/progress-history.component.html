<div class="progress-history-container">
    <header class="app-header">
        <div>logo</div>
    </header>
    <ng-container>
        <section class="cards">
            <article class="card">
                <mat-card-content>
                    <dl class="stats-dl">
                        <div class="row">
                            <dt>合計解答問題数</dt><dd>問</dd>
                        </div>
                        <mat-divider></mat-divider>
                        <div class="row">
                            <dt>合計学習日数</dt><dd>日</dd>
                        </div>
                        <mat-divider></mat-divider>
                        <div class="row">
                            <dt>正答率</dt><dd>%</dd>
                        </div>
                        <mat-divider></mat-divider>
                        <div class="row">
                            <dt>平均解答時間</dt><dd>秒</dd>
                        </div>
                        <mat-divider></mat-divider>
                        <div class="row">
                            <dt>連続正解記録</dt><dd>問</dd>
                        </div>
                    </dl>
                </mat-card-content>
            </article>
            <div class="table-wrap">
                <table mat-table [dataSource]="historyData" class="history-table mat-elevation-z1">
                    <!-- モード -->
                    <ng-container matColumnDef="mode">
                        <th mat-header-cell *matHeaderCellDef> モード </th>
                        <td mat-cell *matCellDef="let element"> {{element.mode}} </td>
                    </ng-container>
                    <!-- 設定時間 -->
                    <ng-container matColumnDef="duration">
                        <th mat-header-cell *matHeaderCellDef> 設定時間 </th>
                        <td mat-cell *matCellDef="let element"> {{element.duration}} </td>
                    </ng-container>
                    <!-- 学習日時 -->
                    <ng-container matColumnDef="dateTime">
                        <th mat-header-cell *matHeaderCellDef> 学習日時 </th>
                        <td mat-cell *matCellDef="let element"> {{element.dateTime | date:'yyyy/MM/dd HH:mm'}} </td>
                    </ng-container>
                    <!-- 行定義 -->
                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row        *matRowDef="let row; columns: displayedColumns"></tr>
                </table>
            </div>
        </section>
    </ng-container>

    <div class="button-row">
        <button mat-raised-button color="primary" class="retry-button" routerLink="/mode">
            <mat-icon>play_arrow</mat-icon>
            モード選択画面へ
        </button>
        <button mat-raised-button color="primary" class="home-button" routerLink="/home">
            <mat-icon>home</mat-icon>
            ホームへ戻る
        </button>
    </div>
</div>
