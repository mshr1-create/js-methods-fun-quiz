<div class="question-screen">
    <header class="qs-header">
        <div>Q/{{ questions.length }}</div>
        <div>logo</div>
        <div>Timer {{ timerDisplay }}</div>
    </header>

    <ng-container *ngIf="questions.length; else loading">
      <section class="cards">
        <article *ngFor="let q of questions; let i = index" class="card">
          <div class="card-header">
            Q{{ i + 1 }}/{{ questions.length }}
            <app-hint-dialog [q]="q"></app-hint-dialog>
        </div>

        <!-- コードブロック -->
        <pre class="code-block">{{ q.text }}</pre>

        <!-- 選択肢をカード形式で表示 -->
        <div *ngIf="q.choices.length > 0">
          <div *ngFor="let choice of q.choices" class="choice-card">
            <label>
              <input 
                type="radio" 
                name="question-{{ q.id }}" 
                [value]="choice.text" 
                (change)="onAnswer(q.id, choice.text)"
              />
              {{ choice.text }}
            </label>
          </div>
        </div>

        <!-- 解答UI -->
        <ng-container [ngSwitch]="q.type">
            <app-multiple-choice
                *ngSwitchCase="'multiple'"
                
                (answer)="onAnswer(q.id, $event)">
            </app-multiple-choice>

            <app-text-answer
                *ngSwitchCase="'text'"
                (answer)="onAnswer(q.id, $event)">
            </app-text-answer>
        </ng-container>

            <!-- カード右下の解答ボタン -->
    <button *ngIf="feedbackMode==='immediate'"
            (click)="onSubmit(q.id)"
            class="answer-btn">
        解答
    </button>

      <!-- ポップアップフィードバック -->
      <app-feedback-popup
        *ngIf="feedbackMode === 'immediate' && popupOpen"
        [question]="questions[currentIndex]"
        [totalQuestions]="questions.length"
        [data]="feedbackData"
        (close)="onCloseFeedback()">
      </app-feedback-popup>

          <!-- インラインフィードバックウィンドウ -->
          <div *ngIf="feedbackOpen[q.id]" class="feedback-window">
            <div class="fb-header" [ngClass]="{ 'correct': feedbackResult[q.id].correct, 'wrong': !feedbackResult[q.id].correct }">
              <span class="icon">
                {{ feedbackResult[q.id].correct ? '✔ 正解！' : '✖ 不正解' }}
              </span>
              <span *ngIf="feedbackResult[q.id].method" class="method">
                A. {{ feedbackResult[q.id].method }}
              </span>
            </div>
            <div class="fb-body">
              {{ feedbackResult[q.id].explanation }}
            </div>
            <button class="fb-next" (click)="feedbackOpen[q.id] = false">
              次へ/Next
            </button>
          </div>


        <!-- 中級・上級のみボタン -->
        <button *ngIf="feedbackMode==='deferred'"
                (click)="submitAll()"
                class="answer-btn">
            採点する
        </button>

        </article>
      </section>
    </ng-container>
    <ng-template #loading>
      <p>問題を読み込み中…</p>
    </ng-template>
</div>
